name: dev-merge-guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  bootstrap-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - run: pnpm install --frozen-lockfile=false
      - run: python3 scripts/init_project_compounding.py audit --config bootstrap/project_brief.yaml --target .
      - run: node --experimental-strip-types scripts/ai/generate-module-index.ts
      - run: node --experimental-strip-types scripts/ai/scan-code-health.ts --strict
      - run: pnpm test
