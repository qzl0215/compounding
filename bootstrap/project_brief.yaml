project_name: Compounding AI Operating System
project_one_liner: 把当前仓库升级成适合 AI 长期协作、任务驱动、可持续重构与自进化的 AI-Native Repo。
success_definition: 生产构建样式稳定，main 可直接发布；新版本先在后台 release 目录完成构建与检查，再通过 current 软链秒级切换；一旦改坏，可在本机或内网管理页 review 最近版本并快速回滚。
current_priority: 切到 main 直发生产，并补齐最小影响发布、回滚和本机管理入口。
must_protect:
  - AGENTS.md 是唯一主源
  - Git 文件即真相
  - 关键改动先 review 再写入
  - 不引入平行规则体系
  - 发布失败不影响当前线上版本
runtime_boundary: server-only
