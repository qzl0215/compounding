version: 0.1.0
project:
  name: Compounding AI Operating System
  bootstrap_mode: ai_upgrade
  adapter_id: node_service
  profile: full_ai_dev
  required_packs:
    - protocol_pack
    - operator_pack
    - ai_exec_pack
    - tooling_pack
toolchain_commands:
  install: pnpm install
  dev: pnpm dev
  build: pnpm build
  test: pnpm test
  bootstrap_doctor: python3 scripts/init_project_compounding.py doctor --target .
  bootstrap_attach: python3 scripts/init_project_compounding.py attach --target .
  bootstrap_audit: python3 scripts/init_project_compounding.py audit --target .
  bootstrap_proposal: python3 scripts/init_project_compounding.py proposal --target .
  preflight: pnpm preflight
  task_preflight: pnpm preflight -- --taskId=t-xxx
  create_task: pnpm coord:task:create -- --taskId=t-xxx --summary=\"中文直给概述\" --why=\"为什么现在\"
  review: pnpm coord:review:run -- --taskId=t-xxx
server_surfaces:
  - surface_id: local-preview
    purpose: preview
    enabled: true
    transport: local_process
    host: 127.0.0.1
    port: 3011
    base_url: http://127.0.0.1:3011
    access_via: pnpm preview:start
    auth:
      mode: none
      secret_refs: []
    commands:
      start: pnpm preview:start
      stop: pnpm preview:stop
      status: pnpm preview:status
      check: pnpm preview:check
    notes:
      - 本地 preview channel；当前仓库由 scripts/local-runtime 目录管理。
  - surface_id: local-production
    purpose: production
    enabled: true
    transport: local_process
    host: 127.0.0.1
    port: 3010
    base_url: http://127.0.0.1:3010
    access_via: pnpm prod:start
    auth:
      mode: none
      secret_refs: []
    commands:
      start: pnpm prod:start
      stop: pnpm prod:stop
      status: pnpm prod:status
      check: pnpm prod:check
    notes:
      - 本地 production runtime；是否真正在线以 prod 状态和 prod 检查命令为准。
github_surface:
  enabled: false
  provider: github
  owner: ""
  repo: ""
  remote_name: origin
  default_branch: main
  auth:
    mode: gh_cli
    secret_refs: []
  commands:
    status: gh repo view
    sync: git fetch --all --prune
    open_pr: gh pr create --fill
    checks: gh pr checks
  required_checks: []
  notes:
    - 当前仓库未检测到 remote origin；接入 GitHub 后再补 owner、repo 和 required_checks。
    - 接入前先运行 `pnpm ai:github-surface:summary`，只看本地还差哪一步，不直接猜 owner/repo。
    - 最小接入顺序固定为：配置 `origin` -> `git push -u origin main` -> 为活跃 task branch 建 upstream -> 回写 owner/repo/required_checks 并启用 `github_surface.enabled`。
    - 默认优先使用 gh auth / gh cli，而不是把 token 写进仓库。
standard_flows:
  preflight:
    basic: pnpm preflight
    task: pnpm preflight -- --taskId=t-xxx
  preview_release:
    prepare: node --experimental-strip-types scripts/release/prepare-release.ts --ref HEAD --channel dev --primary-task <taskId>
    accept: node --experimental-strip-types scripts/release/accept-dev-release.ts --release <releaseId>
    reject: node --experimental-strip-types scripts/release/reject-dev-release.ts --release <releaseId>
  production_release:
    promote_to_main: git checkout main && git merge --no-ff <validated-branch>
    start_runtime: pnpm prod:start
    status: pnpm prod:status
    check: pnpm prod:check
    rollback: node --experimental-strip-types scripts/release/rollback-release.ts --release <releaseId>
agent_shortcuts:
  - shortcut_id: preflight_summary
    label: 优先使用 preflight 摘要
    canonical_command: pnpm ai:preflight:summary
    applies_when: 改动前想快速确认 gate 结果；structural 或 release 场景继续补 -- --taskId=t-xxx
    why: 保留 preflight 判定语义，但把 blocker、note 和 retro hint 压成短摘要，失败时保留 raw tee
    tool_surfaces: [codex, claude, cursor, opencode]
    mode: suggest
  - shortcut_id: validate_static_summary
    label: 优先使用静态校验摘要
    canonical_command: pnpm ai:validate:static:summary
    applies_when: 想看 validate:static 的关键信号，而不是整段脚本输出
    why: 只保留失败项、错误模式和脚本步骤，减少 lint 与 validator 噪音
    tool_surfaces: [codex, claude, cursor, opencode]
    mode: suggest
  - shortcut_id: validate_build_summary
    label: 优先使用构建校验摘要
    canonical_command: pnpm ai:validate:build:summary
    applies_when: 想看 test/build/audit 的结果摘要，而不是整段构建日志
    why: 聚焦失败步骤与关键错误，避免把成功日志整段塞进上下文
    tool_surfaces: [codex, claude, cursor, opencode]
    mode: suggest
  - shortcut_id: review_summary
    label: 优先使用 review 摘要
    canonical_command: pnpm ai:review:summary -- --taskId=t-xxx
    applies_when: 需要看 review 结论、失败 reviewer 和 merge decision
    why: 保留 review contract，但把 reviewer 输出收成短摘要并统计 adoption
    tool_surfaces: [codex, claude, cursor, opencode]
    mode: suggest
  - shortcut_id: preview_summary
    label: 优先使用 preview 健康摘要
    canonical_command: pnpm ai:preview:summary
    applies_when: 需要确认本地 preview 运行态，而不是看完整健康检查 JSON
    why: 直接给出 preview 状态、端口、drift 与失败原因，并统计 shortcut adoption
    tool_surfaces: [codex, claude, cursor, opencode]
    mode: suggest
  - shortcut_id: prod_summary
    label: 优先使用 production 健康摘要
    canonical_command: pnpm ai:prod:summary
    applies_when: 需要确认本地 production 运行态，而不是看完整健康检查 JSON
    why: 直接给出 production 状态、端口、drift 与失败原因，并统计 shortcut adoption
    tool_surfaces: [codex, claude, cursor, opencode]
    mode: suggest
  - shortcut_id: github_surface_summary
    label: 优先使用 GitHub 接入摘要
    canonical_command: pnpm ai:github-surface:summary
    applies_when: 需要确认 remote / upstream / owner / repo / required_checks 还差哪一步
    why: 把 GitHub 接入缺口压成单页摘要，避免在远端未配置时来回查 git 与 operator contract
    tool_surfaces: [codex, claude, cursor, opencode]
    mode: suggest
  - shortcut_id: diff_summary
    label: 优先使用改动摘要
    canonical_command: pnpm ai:diff:summary
    applies_when: 需要看当前变更范围和主要改动文件，而不是整段 git diff
    why: 聚焦文件变更数、增删行和主要改动文件，减少 diff 噪音
    tool_surfaces: [codex, claude, cursor, opencode]
    mode: suggest
  - shortcut_id: tree_summary
    label: 优先使用仓结构摘要
    canonical_command: pnpm ai:tree:summary
    applies_when: 需要快速了解仓库结构和热点目录，而不是展开整段文件列表
    why: 聚焦目录分布、文件类型和少量代表路径，减少读仓噪音
    tool_surfaces: [codex, claude, cursor, opencode]
    mode: suggest
  - shortcut_id: find_summary
    label: 优先使用查找摘要
    canonical_command: pnpm ai:find:summary -- --query=keyword
    applies_when: 需要找某个标识符、模块或文档线索，而不是直接把整段 rg 输出塞进上下文
    why: 聚焦命中总数、命中文件和代表性命中行，减少搜索噪音
    tool_surfaces: [codex, claude, cursor, opencode]
    mode: suggest
  - shortcut_id: read_summary
    label: 优先使用读文件摘要
    canonical_command: pnpm ai:read:summary -- --path=memory/project/current-state.md
    applies_when: 需要先了解文件结构和关键段落，而不是直接展开整份文件
    why: 对 module/task/markdown/code/json/yaml 做结构摘要，信息不足时再回退原文
    tool_surfaces: [codex, claude, cursor, opencode]
    mode: suggest
notes:
  - 该文件只保存服务器访问面、GitHub 接入面和标准发布流的非密钥事实。
  - 真实密钥只放在 env、gh auth、ssh config 或外部 secret manager。
  - 人类扫读版由 docs/OPERATOR_RUNBOOK.md 承接；跨工具薄入口只负责把工具跳转到 AGENTS.md 与本文件。
