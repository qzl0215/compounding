bootstrap_mode: normalize
project_identity:
  name: Compounding AI Operating System
  one_liner: 把当前仓库升级成适合 AI 长期协作、任务驱动、可持续重构与自进化的 AI-Native Repo。
  success_criteria:
    - 首页成为一页经营驾驶舱
    - 用户与 AI 能快速看懂使命、路线图、运营蓝图、组织职责与认知资产边界，并能沿统一 task 闭环持续推进
kernel:
  version: 0.1.0
  adoption_mode: attach
  profile: full_ai_dev
runtime_boundary:
  app_type: ai-native-repo
  deploy_target: local-runtime
  critical_paths:
    - AGENTS.md
    - memory/project/operating-blueprint.md
    - scripts/compounding_bootstrap/*
local_overrides:
  owned_paths:
    - memory/project/**
    - tasks/queue/**
    - apps/**
  protected_rules:
    - 禁止自动修改核心业务代码
    - 禁止自动修改部署主入口
    - 禁止自动修改生产脚本
upgrade_policy:
  auto_apply_paths:
    - bootstrap/project_brief.yaml
    - tasks/templates/task-template.md
  proposal_required_paths:
    - AGENTS.md
    - docs/WORK_MODES.md
    - docs/DEV_WORKFLOW.md
    - docs/ARCHITECTURE.md
    - docs/PROJECT_RULES.md
    - docs/AI_OPERATING_MODEL.md
    - docs/ASSET_MAINTENANCE.md
    - scripts/compounding_bootstrap/*
  blocked_paths:
    - apps/**
    - scripts/release/**
    - scripts/local-runtime/**
    - deploy/**
