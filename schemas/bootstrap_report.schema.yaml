type: object
required:
  - project
  - kernel
  - status
  - detected
  - actions
properties:
  project:
    type: object
    required:
      - name
      - path
    properties:
      name:
        type: string
      path:
        type: string
  kernel:
    type: object
    required:
      - version
      - adoption_mode
    properties:
      version:
        type: string
      adoption_mode:
        type: string
        enum: [new, attach, reattach]
  status:
    type: object
    required:
      - attached
      - attach_score
      - summary
    properties:
      attached:
        type: boolean
      attach_score:
        type: integer
      summary:
        type: string
  detected:
    type: object
    required:
      - managed_assets
      - shell_assets
      - protected_assets
      - local_overrides
    properties:
      managed_assets:
        type: array
        items:
          type: string
      shell_assets:
        type: array
        items:
          type: string
      protected_assets:
        type: array
        items:
          type: string
      local_overrides:
        type: array
        items:
          type: string
  actions:
    type: object
    required:
      - created
      - skipped
      - needs_proposal
      - warnings
    properties:
      created:
        type: array
        items:
          type: string
      skipped:
        type: array
        items:
          type: string
      needs_proposal:
        type: array
        items:
          type: string
      warnings:
        type: array
        items:
          type: string
